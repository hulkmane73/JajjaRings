<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Aura Rings ✦ Spiritual & Healing Crystal Rings</title>
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #e0c978;
            --dark: #1a1a1a;
            --darker: #0f0f0f;
            --light: #f5f0e8;
            --cream: #faf7f0;
            --accent: #8b5cf6;
            --accent-light: #a78bfa;
            --text: #2c2c2c;
            --text-light: #6b6b6b;
            --white: #ffffff;
            --border: #e8e0d5;
            --success: #2d6a4f;
            --danger: #c0392b;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.12);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--cream);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ── TOP BAR ── */
        .top-bar {
            background: var(--darker);
            color: #ccc;
            font-size: 0.8rem;
            padding: 8px 0;
            text-align: center;
            letter-spacing: 0.5px;
        }
        .top-bar span {
            color: var(--gold);
            font-weight: 600;
        }
        .top-bar .divider {
            margin: 0 15px;
            opacity: 0.4;
        }

        /* ── HEADER ── */
        header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-sm);
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--dark);
        }
        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--gold), #b8941f);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #fff;
            box-shadow: 0 2px 10px rgba(201, 168, 76, 0.4);
        }
        .logo-text {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--dark);
        }
        .logo-text span {
            color: var(--gold);
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        .cart-btn {
            position: relative;
            background: none;
            border: 2px solid var(--gold);
            color: var(--dark);
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 7px;
            background: #fff;
        }
        .cart-btn:hover {
            background: var(--gold);
            color: #fff;
        }
        .cart-count {
            background: var(--danger);
            color: #fff;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            position: absolute;
            top: -6px;
            right: -6px;
        }
        .trust-badges-header {
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-light);
        }
        .trust-badge-mini {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            color: #555;
        }
        .trust-badge-mini img {
            width: 16px;
            height: 16px;
        }

        /* ── NAV ── */
        nav {
            background: var(--white);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            gap: 0;
            overflow-x: auto;
        }
        .nav-inner a {
            display: block;
            padding: 14px 20px;
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            font-size: 0.9rem;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
        }
        .nav-inner a:hover,
        .nav-inner a.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        /* ── HERO ── */
        .hero {
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 40%, #0f0f1a 100%);
            color: #fff;
            text-align: center;
            padding: 70px 24px 60px;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -80px;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201, 168, 76, 0.25) 0%, transparent 70%);
            pointer-events: none;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: -60px;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, transparent 70%);
            pointer-events: none;
        }
        .hero h1 {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            position: relative;
            z-index: 1;
        }
        .hero h1 span {
            color: var(--gold-light);
        }
        .hero p {
            font-size: 1.1rem;
            max-width: 600px;
            margin: 16px auto 0;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }
        .hero-stars {
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: var(--gold-light);
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        /* ── MAIN CONTAINER ── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* ── SECTION TITLES ── */
        .section-title {
            text-align: center;
            margin-bottom: 36px;
        }
        .section-title h2 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--dark);
        }
        .section-title .underline {
            width: 50px;
            height: 3px;
            background: var(--gold);
            margin: 10px auto 0;
            border-radius: 2px;
        }
        .section-title p {
            color: var(--text-light);
            margin-top: 8px;
            font-size: 0.95rem;
        }

        /* ── PRODUCT GRID ── */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 28px;
        }
        .product-card {
            background: var(--white);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }
        .product-img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            position: relative;
            overflow: hidden;
        }
        .product-img.ring1 {
            background: linear-gradient(135deg, #fdf6e3, #f5e6c8);
        }
        .product-img.ring2 {
            background: linear-gradient(135deg, #ede9fe, #ddd6fe);
        }
        .product-img.ring3 {
            background: linear-gradient(135deg, #fce7f3, #fbcfe8);
        }
        .product-img.ring4 {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
        }
        .product-img.ring5 {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
        }
        .product-img.ring6 {
            background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
        }
        .product-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--accent);
            color: #fff;
            font-size: 0.7rem;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .product-badge.bestseller {
            background: var(--gold);
            color: #000;
        }
        .product-info {
            padding: 18px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .product-info h3 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--dark);
        }
        .product-info .subtitle {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 8px;
        }
        .product-info .desc {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 12px;
            flex: 1;
            line-height: 1.5;
        }
        .product-info .price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--dark);
        }
        .product-info .price .currency {
            font-size: 0.9rem;
            color: var(--text-light);
        }
        .product-info .old-price {
            text-decoration: line-through;
            color: #bbb;
            font-size: 0.9rem;
            margin-left: 6px;
        }
        .btn {
            display: inline-block;
            padding: 12px 22px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            text-align: center;
            border: none;
            transition: var(--transition);
            text-decoration: none;
            letter-spacing: 0.3px;
        }
        .btn-gold {
            background: linear-gradient(135deg, var(--gold), #b8941f);
            color: #fff;
            box-shadow: 0 4px 14px rgba(201, 168, 76, 0.35);
        }
        .btn-gold:hover {
            background: linear-gradient(135deg, #d4b34f, #c9a01f);
            box-shadow: 0 6px 20px rgba(201, 168, 76, 0.5);
            transform: translateY(-1px);
        }
        .btn-outline {
            border: 2px solid var(--gold);
            color: var(--dark);
            background: transparent;
        }
        .btn-outline:hover {
            background: var(--gold);
            color: #fff;
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: 0.8rem;
        }
        .btn-block {
            display: block;
            width: 100%;
        }

        /* ── FEATURES STRIP ── */
        .features-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        .feature-item {
            text-align: center;
            padding: 20px;
            background: var(--white);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        .feature-item .icon {
            font-size: 2.2rem;
            margin-bottom: 8px;
        }
        .feature-item h4 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--dark);
        }
        .feature-item p {
            font-size: 0.78rem;
            color: var(--text-light);
        }

        /* ── TESTIMONIALS ── */
        .testimonials {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 28px;
            margin: 40px 0;
            box-shadow: var(--shadow);
        }
        .testimonial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }
        .testimonial-card {
            padding: 20px;
            border-radius: var(--radius-sm);
            background: #fdfbf7;
            border: 1px solid #efe8d8;
        }
        .testimonial-card .stars {
            color: var(--gold);
            font-size: 1rem;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .testimonial-card .quote {
            font-style: italic;
            font-size: 0.9rem;
            color: #444;
            margin-bottom: 10px;
        }
        .testimonial-card .author {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--dark);
        }
        .testimonial-card .location {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        /* ── CART SIDEBAR ── */
        .cart-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .cart-overlay.open {
            opacity: 1;
            pointer-events: all;
        }
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -420px;
            width: 400px;
            max-width: 90vw;
            height: 100vh;
            background: #fff;
            z-index: 2001;
            box-shadow: -4px 0 30px rgba(0, 0, 0, 0.2);
            transition: right 0.35s ease;
            display: flex;
            flex-direction: column;
        }
        .cart-sidebar.open {
            right: 0;
        }
        .cart-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .cart-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
            transition: var(--transition);
        }
        .cart-close:hover {
            color: #000;
        }
        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .cart-empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .cart-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            align-items: center;
        }
        .cart-item-img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9f5ec;
            flex-shrink: 0;
        }
        .cart-item-info {
            flex: 1;
        }
        .cart-item-info .name {
            font-weight: 600;
            font-size: 0.85rem;
        }
        .cart-item-info .price {
            font-size: 0.8rem;
            color: var(--text-light);
        }
        .cart-item-remove {
            background: none;
            border: none;
            color: #c0392b;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .cart-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }
        .cart-total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 12px;
        }
        .cart-footer .btn {
            width: 100%;
            margin-bottom: 6px;
        }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }
        .modal {
            background: #fff;
            border-radius: var(--radius);
            padding: 30px;
            width: 500px;
            max-width: 95vw;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }
        .modal h3 {
            margin-bottom: 16px;
            font-size: 1.3rem;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.85rem;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: var(--transition);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.1);
        }
        .payment-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 8px 0;
        }
        .payment-option {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            text-align: center;
            transition: var(--transition);
            font-weight: 500;
            font-size: 0.85rem;
            background: #fafafa;
        }
        .payment-option:hover,
        .payment-option.selected {
            border-color: var(--gold);
            background: #fffdf5;
        }
        .payment-option.selected {
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15);
        }

            display: none;
            background: #f9f7f0;
            padding: 14px;
            border-ra
